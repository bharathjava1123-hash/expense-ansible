- name: mysql configuration
  hosts: mysql
  become: yes
  tasks:
  - name: ansible to install pymysql
    ansible.builtin.pip:
      name:
      - PyMySQL
      executable: pip3.9
  
  - name: mysql installation
    ansible.builtin.package:
     name: mysql-server
     state: present
     
  - name: start mysql server
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes